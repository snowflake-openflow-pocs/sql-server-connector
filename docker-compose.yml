version: '3.8'

services:
  sqlserver:
    platform: linux/amd64
    build: ./containers/sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrongPassw0rd!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - cdc_net
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrongPassw0rd! -C -Q 'SELECT 1'"]
      interval: 10s
      retries: 10
      start_period: 30s

  streamlit:
    platform: linux/amd64
    build: ./containers/streamlit
    environment:
      - SQL_HOST=sqlserver
      - SQL_PORT=1433
      - SQL_USER=sa
      - SQL_PASSWORD=YourStrongPassw0rd!
      - SQL_DATABASE=DemoDB
    ports:
      - "8501:8501"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - cdc_net
    restart: unless-stopped

volumes:
  sqlserver_data:

networks:
  cdc_net:
    driver: bridge